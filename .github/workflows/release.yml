name: Release

on:
  push:
    tags:
      - "**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false


jobs:

  release:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write


    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.body }}


    steps:

      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Get version from tag
        id: version
        run: |

          VERSION="${GITHUB_REF_NAME}"


          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([\-].+)?$ ]]; then
            echo "Invalid tag version: $VERSION"
            exit 1
          fi


          if [[ "$VERSION" != v* ]]; then
            VERSION="v$VERSION"
          fi


          echo "version=$VERSION" >> "$GITHUB_OUTPUT"



      - name: Checkout main branch
        run: |

          git fetch origin main

          git checkout main

          git pull --rebase origin main



      - name: Generate changelog
        id: changelog
        run: |

          git fetch --tags


          previous=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)


          if [ -n "$previous" ]; then
            range="${previous}..HEAD"
          else
            range="HEAD"
          fi


          log=$(git log "$range" --pretty=format:"%s|%h" --no-merges)


          section() {

            local title="$1"
            local pattern="$2"


            matches=$(echo "$log" | grep -iE "^${pattern}(\(.+\))?:" || true)


            if [ -n "$matches" ]; then

              echo "### $title"

              echo "$matches" |
              awk -F'|' '{sub(/^[a-zA-Z]+(\([^)]*\))?: */, "", $1); print "- " $1 " (" $2 ")"}'

              echo ""

            fi

          }


          {

            echo "body<<EOF"

            echo "## ${{ steps.version.outputs.version }} - $(date +%Y-%m-%d)"

            echo ""


            section "✨ Features" "feat"
            section "🐛 Fixes" "fix"
            section "♻️ Refactors" "refactor"
            section "📝 Documentation" "docs"
            section "⚡ Performance" "perf"
            section "🧹 Chores" "chore"
            section "🔧 CI" "ci"


            other=$(echo "$log" |
              grep -ivE "^(feat|fix|refactor|docs|perf|chore|ci)(\(.+\))?:" ||
              true)


            if [ -n "$other" ]; then

              echo "### 📦 Other"

              echo "$other" |
              awk -F'|' '{print "- " $1 " (" $2 ")"}'

              echo ""

            fi


            echo "EOF"


          } >> "$GITHUB_OUTPUT"



      - name: Update CHANGELOG.md
        run: |

          touch CHANGELOG.md


          tmp=$(mktemp)


          {

            echo "${{ steps.changelog.outputs.body }}"

            echo ""

            cat CHANGELOG.md


          } > "$tmp"


          mv "$tmp" CHANGELOG.md




      - name: Commit changelog
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add CHANGELOG.md


          git commit \
            -m "chore: update CHANGELOG.md for ${{ steps.version.outputs.version }}"



      - name: Move tag to release commit
        run: |

          git tag -f "${{ steps.version.outputs.version }}"

          git push origin \
            "${{ steps.version.outputs.version }}" \
            --force




      - name: Push changelog commit
        run: |

          git push origin main




      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3

        with:

          tag_name: ${{ steps.version.outputs.version }}

          name: ${{ steps.version.outputs.version }}

          body: ${{ steps.changelog.outputs.body }}

          prerelease: ${{ contains(steps.version.outputs.version, 'beta') }}


        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}





  publish:


    needs: release


    runs-on: ubuntu-latest


    permissions:

      contents: read

      id-token: write



    steps:


      - name: Checkout release tag
        uses: actions/checkout@v7
        with:

          ref: ${{ needs.release.outputs.version }}

          fetch-depth: 0




      - name: Setup Node

        uses: actions/setup-node@v6

        with:

          node-version: "24"

          registry-url: "https://registry.npmjs.org"




      - name: Install dependencies

        run: npm ci




      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |

          VERSION="${{ needs.release.outputs.version }}"


          if [[ "$VERSION" == *beta* ]]; then

            npm publish \
              --provenance \
              --access public \
              --tag beta

          else

            npm publish \
              --provenance \
              --access public

          fi
