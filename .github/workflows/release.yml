name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # IMPORTANT: checkout main, not the tag
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Generate changelog from commits
        id: changelog
        run: |
          git fetch --tags

          prev_tag=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1)

          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..${GITHUB_REF_NAME}"
          else
            range="${GITHUB_REF_NAME}"
          fi

          log=$(git log "$range" --pretty=format:"%s|%h" --no-merges)

          section() {
            local title="$1"
            local pattern="$2"
            local matches

            matches=$(echo "$log" | grep -iE "^${pattern}(\(.+\))?:" || true)

            if [ -n "$matches" ]; then
              echo "### $title"
              echo "$matches" | awk -F'|' '{sub(/^[a-zA-Z]+(\([^)]*\))?: */, "", $1); print "- " $1 " (" $2 ")"}'
              echo ""
            fi
          }

          {
            echo "body<<EOF"
            echo "## ${GITHUB_REF_NAME} - $(date +%Y-%m-%d)"
            echo ""

            section "✨ Features" "feat"
            section "🐛 Fixes" "fix"
            section "♻️ Refactors" "refactor"
            section "📝 Docs" "docs"
            section "⚡ Performance" "perf"
            section "🧹 Chores" "chore"
            section "🔧 CI" "ci"

            other=$(echo "$log" | grep -ivE "^(feat|fix|refactor|docs|perf|chore|ci)(\(.+\))?:" || true)

            if [ -n "$other" ]; then
              echo "### 📦 Other"
              echo "$other" | awk -F'|' '{print "- " $1 " (" $2 ")"}'
              echo ""
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"


      - name: Update CHANGELOG.md
        run: |
          touch CHANGELOG.md

          tmp=$(mktemp)

          {
            echo "${{ steps.changelog.outputs.body }}"
            echo ""
            cat CHANGELOG.md
          } > "$tmp"

          mv "$tmp" CHANGELOG.md


      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changelog changes"
          else
            git commit -m "chore: update CHANGELOG.md for ${GITHUB_REF_NAME}"
            git push origin main
          fi


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  publish:
    needs: release

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Keep this as tag checkout
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Publish to npm
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          if [[ "$tag" == *beta* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
          